global:
  scrape_interval: 5s

scrape_configs:
  - job_name: sha-app
    static_configs:
      - targets: ['sha-app:8000']
    metrics_path: /health
    honor_labels: true

  - job_name: orchestrator
    static_configs:
      - targets: ['orchestrator:8080']
    metrics_path: /metrics
    honor_labels: true
